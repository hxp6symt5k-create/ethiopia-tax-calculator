<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suzi's Tax Calculator 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Serif+Ethiopic:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --deep-purple: #6c5ce7;
            --soft-purple: #f3f0ff;
            --text-dark: #2d3436;
            --card-white: #ffffff;
            --accent-pink: #fd79a8;
        }

        body {
            font-family: 'Quicksand', 'Tajawal', 'Noto Serif Ethiopic', sans-serif;
            background: linear-gradient(135deg, #f3f0ff 0%, #ffeef8 100%);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-white);
            padding: 2.5rem;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.15);
            width: 100%;
            max-width: 480px;
            border: 2px solid #ffffff;
            position: relative;
            overflow: hidden;
        }

        /* زر تبديل اللغة الأنيق */
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 18px;
            border-radius: 20px;
            border: none;
            background: var(--soft-purple);
            color: var(--deep-purple);
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.1);
        }

        .lang-switch:hover {
            background: var(--deep-purple);
            color: white;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, var(--deep-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--deep-purple);
            font-size: 0.95rem;
            font-weight: 700;
            padding-left: 5px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 18px;
            border: 2px solid #eeeefb;
            background: #fff;
            color: var(--text-dark);
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-pink);
            box-shadow: 0 0 15px rgba(255, 133, 162, 0.2);
        }

        .results-card {
            background: linear-gradient(145deg, #ffffff, #f9f8ff);
            padding: 1.8rem;
            border-radius: 25px;
            margin-top: 1.5rem;
            border: 1px solid #f1f0ff;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #f1f0ff;
        }

        .result-item.total {
            border-bottom: none;
            margin-top: 1rem;
            color: var(--accent-pink);
            font-weight: 700;
            font-size: 1.5rem;
        }

        .btn-pdf {
            width: 100%;
            padding: 16px;
            margin-top: 2rem;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, var(--deep-purple), var(--primary-pink));
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.4s;
            box-shadow: 0 8px 20px rgba(255, 133, 162, 0.3);
        }

        .btn-pdf:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 133, 162, 0.4);
        }

        .note {
            text-align: center;
            margin-top: 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--deep-purple);
            background: #fdf2f7;
            padding: 10px;
            border-radius: 15px;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.7;
        }

        /* زينة علوية صغيرة */
        .decoration {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 80px;
            height: 80px;
            background: rgba(255, 133, 162, 0.1);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body>

<div class="container" id="calculator-content">
    <div class="decoration"></div>
    <button class="lang-switch" onclick="toggleLanguage()" id="langBtn">አማርኛ</button>
    
    <h1 id="mainTitle">Suzi's Tax Calc ✨</h1>
    
    <div class="input-group">
        <label id="labelGross">Gross Salary (ETB)</label>
        <input type="number" id="grossInput" placeholder="Enter amount..." oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label id="labelAllowance">Allowances (Bonus)</label>
        <input type="number" id="allowanceInput" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="results-card" id="pdf-area">
        <div class="result-item">
            <span id="resTotalLabel">Total Income</span>
            <span id="display-gross">0.00 ETB</span>
        </div>
        <div class="result-item">
            <span id="resTaxLabel">Income Tax</span>
            <span id="tax" style="color: #e84393;">0.00 ETB</span>
        </div>
        <div class="result-item total">
            <span id="resNetLabel">Net Pay</span>
            <span id="net">0.00 ETB</span>
        </div>
    </div>

    <button class="btn-pdf" id="btnPdf" onclick="downloadPDF()">🌸 Download My Payslip</button>

    <div class="note">
        "Welcome to hell with regards Suzan 😁"
    </div>

    <div class="footer" id="footerText">
        Updated Ethiopia Tax Law 2026
    </div>
</div>

<script>
    let currentLang = 'en';

    const translations = {
        en: {
            title: "Suzi's Tax Calc ✨",
            gross: "Gross Salary (ETB)",
            allowance: "Allowances (Bonus)",
            resTotal: "Total Income",
            resTax: "Income Tax",
            resNet: "Net Pay",
            btnPdf: "🌸 Download My Payslip",
            footer: "Updated Ethiopia Tax Law 2026",
            langBtn: "አማርኛ"
        },
        am: {
            title: "የደመወዝ ማስያ ✨",
            gross: "ጠቅላላ ደመወዝ (ETB)",
            allowance: "ተضافሪ ክፍያዎች (አበል)",
            resTotal: "ጠቅላላ ገቢ",
            resTax: "የደመወዝ ግብር",
            resNet: "የተጣራ ደመወز",
            btnPdf: "🌸 በPDF አውርድ",
            footer: "የኢትዮጵያ የ2018 ዓ.ም የግብር ሕግ",
            langBtn: "English"
        }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'am' : 'en';
        const t = translations[currentLang];
        document.getElementById('mainTitle').innerText = t.title;
        document.getElementById('labelGross').innerText = t.gross;
        document.getElementById('labelAllowance').innerText = t.allowance;
        document.getElementById('resTotalLabel').innerText = t.resTotal;
        document.getElementById('resTaxLabel').innerText = t.resTax;
        document.getElementById('resNetLabel').innerText = t.resNet;
        document.getElementById('btnPdf').innerText = t.btnPdf;
        document.getElementById('footerText').innerText = t.footer;
        document.getElementById('langBtn').innerText = t.langBtn;
    }

    function calculate() {
        const gross = parseFloat(document.getElementById('grossInput').value) || 0;
        const allowance = parseFloat(document.getElementById('allowanceInput').value) || 0;
        
        let tax = 0;
        if (gross > 14000) tax = (gross * 0.35) - 2050;
        else if (gross > 10000) tax = (gross * 0.30) - 1350;
        else if (gross > 7000) tax = (gross * 0.25) - 850;
        else if (gross > 4000) tax = (gross * 0.20) - 500;
        else if (gross > 2000) tax = (gross * 0.15) - 300;
        else tax = 0;

        if (tax < 0) tax = 0;
        const netPay = (gross - tax) + allowance;

        const format = (num) => num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('display-gross').innerText = format(gross) + " ETB";
        document.getElementById('tax').innerText = "- " + format(tax) + " ETB";
        document.getElementById('net').innerText = format(netPay) + " ETB";
    }

    function downloadPDF() {
        const element = document.getElementById('pdf-area');
        const opt = {
            margin: 1,
            filename: 'My_Salary_Slip.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
