<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethiopian Salary Tax Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Serif+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --secondary: #3b82f6;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #16a34a;
            --danger: #dc2626;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Tajawal', 'Noto Serif Ethiopic', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
            position: relative;
        }

        /* زر تبديل اللغة */
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .lang-switch:hover {
            background: var(--primary);
            color: white;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 2rem;
            color: var(--primary);
        }

        .input-group { margin-bottom: 1.2rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .results-card {
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 15px;
            margin-top: 1.5rem;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #cbd5e1;
        }

        .result-item.total {
            border-bottom: none;
            margin-top: 1rem;
            color: var(--accent);
            font-weight: 700;
            font-size: 1.4rem;
        }

        .btn-pdf {
            width: 100%;
            padding: 14px;
            margin-top: 1.5rem;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-pdf:hover { opacity: 0.9; transform: scale(1.02); }

        .note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            color: var(--danger);
            font-style: italic;
        }

        .footer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container" id="calculator-content">
    <button class="lang-switch" onclick="toggleLanguage()" id="langBtn">አማርኛ</button>
    
    <h1 id="mainTitle">Ethiopian Salary Calculator</h1>
    
    <div class="input-group">
        <label id="labelGross">Gross Salary (ETB)</label>
        <input type="number" id="grossInput" placeholder="0.00" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label id="labelAllowance">Allowances (Non-Taxable)</label>
        <input type="number" id="allowanceInput" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="results-card" id="pdf-area">
        <div class="result-item">
            <span id="resTotalLabel">Total Gross</span>
            <span id="display-gross">0.00 ETB</span>
        </div>
        <div class="result-item">
            <span id="resTaxLabel">Income Tax</span>
            <span id="tax" style="color: var(--danger);">0.00 ETB</span>
        </div>
        <div class="result-item total">
            <span id="resNetLabel">Net Pay</span>
            <span id="net">0.00 ETB</span>
        </div>
    </div>

    <button class="btn-pdf" id="btnPdf" onclick="downloadPDF()">📥 Download PDF</button>

    <div class="note">
        "Welcome to hell with regards Suzan 😁"
    </div>

    <div class="footer" id="footerText">
        Updated Tax Law 2026 (1395/2017 E.C.)
    </div>
</div>

<script>
    let currentLang = 'en';

    const translations = {
        en: {
            title: "Ethiopian Salary Calculator",
            gross: "Gross Salary (ETB)",
            allowance: "Allowances (Non-Taxable)",
            resTotal: "Total Gross",
            resTax: "Income Tax",
            resNet: "Net Pay",
            btnPdf: "📥 Download PDF",
            footer: "Updated Tax Law 2026 (1395/2017 E.C.)",
            langBtn: "አማርኛ"
        },
        am: {
            title: "የደመወዝ ማስያ",
            gross: "ጠቅላላ ደመወዝ (ETB)",
            allowance: "የማይከፈልባቸው አበል",
            resTotal: "ጠቅላลา ድምር",
            resTax: "የደመወዝ ግብር",
            resNet: "የተጣራ ደመወዝ",
            btnPdf: "📥 በPDF አውርድ",
            footer: "የ2018 ዓ.ም የግብر ሕግ (1395/2017)",
            langBtn: "English"
        }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'am' : 'en';
        const t = translations[currentLang];
        
        document.getElementById('mainTitle').innerText = t.title;
        document.getElementById('labelGross').innerText = t.gross;
        document.getElementById('labelAllowance').innerText = t.allowance;
        document.getElementById('resTotalLabel').innerText = t.resTotal;
        document.getElementById('resTaxLabel').innerText = t.resTax;
        document.getElementById('resNetLabel').innerText = t.resNet;
        document.getElementById('btnPdf').innerText = t.btnPdf;
        document.getElementById('footerText').innerText = t.footer;
        document.getElementById('langBtn').innerText = t.langBtn;
        
        // تغيير اتجاه النص حسب اللغة
        document.body.dir = currentLang === 'am' ? 'ltr' : 'ltr'; 
    }

    function calculate() {
        const gross = parseFloat(document.getElementById('grossInput').value) || 0;
        const allowance = parseFloat(document.getElementById('allowanceInput').value) || 0;
        
        const taxableIncome = gross; 
        let tax = 0;

        if (taxableIncome > 14000) tax = (taxableIncome * 0.35) - 2050;
        else if (taxableIncome > 10000) tax = (taxableIncome * 0.30) - 1350;
        else if (taxableIncome > 7000) tax = (taxableIncome * 0.25) - 850;
        else if (taxableIncome > 4000) tax = (taxableIncome * 0.20) - 500;
        else if (taxableIncome > 2000) tax = (taxableIncome * 0.15) - 300;
        else tax = 0;

        if (tax < 0) tax = 0;
        const netPay = (gross - tax) + allowance;

        const format = (num) => num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        document.getElementById('display-gross').innerText = format(gross) + " ETB";
        document.getElementById('tax').innerText = "- " + format(tax) + " ETB";
        document.getElementById('net').innerText = format(netPay) + " ETB";
    }

    function downloadPDF() {
        const element = document.getElementById('pdf-area');
        const opt = {
            margin: 1,
            filename: 'Salary_Slip.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
